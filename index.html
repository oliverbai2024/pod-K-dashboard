<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Project Imperium – Pod K Meeting Dashboard</title>

  <style>
    :root{
      --bg:#ffffff;
      --ink:#2f2f33;
      --muted:rgba(47,47,51,.68);
      --border:rgba(47,47,51,.14);
      --panel:#ffffff;

      --shadow: 0 12px 30px rgba(0,0,0,.08);
      --shadow-soft: 0 10px 22px rgba(0,0,0,.05);
      --radius: 16px;
      --focus: rgba(47,47,51,.12);

      --next-bg: rgba(66, 180, 120, .18);
      --next-br: rgba(66, 180, 120, .38);
      --next-tx: rgba(24, 110, 70, 1);

      --pass-bg: rgba(245, 106, 106, .16);
      --pass-br: rgba(245, 106, 106, .36);
      --pass-tx: rgba(150, 40, 40, 1);

      --upcoming-bg: rgba(47,47,51,.05);
      --upcoming-br: rgba(47,47,51,.16);
      --upcoming-tx: rgba(47,47,51,.84);

      --cancel-bg: rgba(255, 196, 64, .18);
      --cancel-br: rgba(255, 196, 64, .42);
      --cancel-tx: rgba(138, 88, 0, 1);

      --tab-on:#2f2f33;
      --tab-on-ink:#ffffff;

      --glass: rgba(255,255,255,.88);
      --glass-border: rgba(47,47,51,.14);

      --btn-bg: rgba(0,0,0,.01);
      --btn-ink: var(--ink);
      --btn-br: var(--border);
      --btn-primary-bg: var(--tab-on);
      --btn-primary-ink: var(--tab-on-ink);
      --btn-primary-br: var(--tab-on);

      --dock-bg: rgba(255,255,255,.92);
      --dock-border: rgba(47,47,51,.16);
      --dock-shadow: 0 18px 50px rgba(0,0,0,.14);
      --dock-track: rgba(0,0,0,.06);

      --trans: 220ms ease;

      --base-font: 16px;
      --small-font: 12px;
      --body-line: 1.35;
      --readable-letter: 0px;
      --readable-word: 0px;

      --w-regular: 400;
      --w-medium: 500;
      --w-semibold: 600;
      --w-bold: 700;
    }

    body.dark{
      --bg:#0f1115;
      --ink:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.64);
      --border:rgba(255,255,255,.16);
      --panel:#141824;

      --shadow: 0 18px 48px rgba(0,0,0,.55);
      --shadow-soft: 0 14px 30px rgba(0,0,0,.40);
      --focus: rgba(255,255,255,.08);

      --next-bg: rgba(66, 180, 120, .16);
      --next-br: rgba(66, 180, 120, .34);
      --next-tx: rgba(140, 235, 195, 1);

      --pass-bg: rgba(245, 106, 106, .14);
      --pass-br: rgba(245, 106, 106, .30);
      --pass-tx: rgba(255, 178, 178, 1);

      --upcoming-bg: rgba(255,255,255,.05);
      --upcoming-br: rgba(255,255,255,.18);
      --upcoming-tx: rgba(255,255,255,.84);

      --cancel-bg: rgba(255, 196, 64, .14);
      --cancel-br: rgba(255, 196, 64, .34);
      --cancel-tx: rgba(255, 225, 163, 1);

      --tab-on:#ffffff;
      --tab-on-ink:#0f1115;

      --glass: rgba(15,17,21,.74);
      --glass-border: rgba(255,255,255,.12);

      --btn-bg: rgba(255,255,255,.05);
      --btn-ink: var(--ink);
      --btn-br: var(--border);
      --btn-primary-bg: #ffffff;
      --btn-primary-ink: #0f1115;
      --btn-primary-br: #ffffff;

      --dock-bg: rgba(20,24,36,.92);
      --dock-border: rgba(255,255,255,.16);
      --dock-shadow: 0 22px 60px rgba(0,0,0,.70);
      --dock-track: rgba(255,255,255,.08);
    }

    body.cb{
      --next-bg: rgba(72, 122, 255, .18);
      --next-br: rgba(72, 122, 255, .42);
      --next-tx: rgba(40, 78, 190, 1);

      --pass-bg: rgba(255, 168, 76, .18);
      --pass-br: rgba(255, 168, 76, .42);
      --pass-tx: rgba(150, 92, 18, 1);

      --cancel-bg: rgba(171, 111, 255, .18);
      --cancel-br: rgba(171, 111, 255, .42);
      --cancel-tx: rgba(99, 46, 176, 1);
    }

    body.dark.cb{
      --next-bg: rgba(72, 122, 255, .16);
      --next-br: rgba(72, 122, 255, .38);
      --next-tx: rgba(170, 195, 255, 1);

      --pass-bg: rgba(255, 168, 76, .14);
      --pass-br: rgba(255, 168, 76, .34);
      --pass-tx: rgba(255, 214, 168, 1);

      --cancel-bg: rgba(171, 111, 255, .14);
      --cancel-br: rgba(171, 111, 255, .34);
      --cancel-tx: rgba(222, 196, 255, 1);
    }

    body.readable{
      --small-font: 13px;
      --body-line: 1.45;
      --readable-letter: .15px;
      --readable-word: .45px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
      color: var(--ink);
      background: var(--bg);
      min-height:100vh;
      font-weight: var(--w-regular);
      font-size: var(--base-font);
      line-height: var(--body-line);
      letter-spacing: var(--readable-letter);
      word-spacing: var(--readable-word);
      transition: background-color var(--trans), color var(--trans);
      font-variant-numeric: tabular-nums;
      overflow-x: hidden;
    }

    body.readable .card,
    body.readable .item,
    body.readable .view{
      box-shadow: none;
    }
    body.readable .row,
    body.readable .count{
      background: transparent;
    }
    body.readable .tab:hover,
    body.readable .btn:hover,
    body.readable .pill button:hover,
    body.readable .toggle-link:hover{
      transform: none;
      box-shadow: none;
    }

    .wrap,
    .dock,
    .toast{
      position: relative;
      z-index: 1;
    }

    .wrap{
      max-width: 1040px;
      margin: 0 auto;
      padding: 18px 16px 126px;
    }

    .topbar{
      position: sticky;
      top: 0;
      background: var(--glass);
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      z-index: 10;
      transition: background-color var(--trans), border-color var(--trans);
    }
    .topbar-inner{
      max-width: 1040px;
      margin: 0 auto;
      padding: 12px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .brand{
      font-weight: var(--w-bold);
      letter-spacing: .2px;
      line-height: 1.2;
      max-width: 70ch;
      cursor: pointer;
      user-select: none;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .tabs{
      display:flex;
      gap: 8px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(0,0,0,.02);
      transition: background-color var(--trans), border-color var(--trans);
    }
    body.dark .tabs{ background: rgba(255,255,255,.04); }

    .tab{
      appearance:none;
      border:0;
      background: transparent;
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 999px;
      cursor:pointer;
      font-weight: var(--w-semibold);
      transition: transform .16s ease, background-color var(--trans), color var(--trans), box-shadow .16s ease;
      white-space: nowrap;
      font-size: 14px;
    }
    .tab:hover{ transform: translateY(-1px); }
    .tab[aria-selected="true"]{
      background: var(--tab-on);
      color: var(--tab-on-ink);
      box-shadow: 0 10px 20px rgba(0,0,0,.10);
    }

    .views{ position: relative; margin-top: 16px; }
    .view{
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      transform-origin: top centre;
      transition: opacity .18s ease, transform .18s ease, filter .18s ease, background-color var(--trans), border-color var(--trans), box-shadow var(--trans);
      backdrop-filter: blur(8px);
    }
    .view.hidden{
      position:absolute;
      inset:0;
      opacity:0;
      transform: translateY(10px) scale(.99);
      filter: blur(2px);
      pointer-events:none;
    }

    .header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    h1{
      font-size: 20px;
      margin: 0;
      font-weight: var(--w-bold);
      line-height: 1.2;
      letter-spacing: .2px;
    }
    .sub{
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
      font-weight: var(--w-regular);
      transition: color var(--trans);
    }

    body.readable .sub{ line-height: 1.55; }
    body.readable .bullets{ gap: 9px; line-height: 1.6; }
    body.readable .item-meta{ line-height: 1.55; }

    .divider{
      height:1px;
      background: var(--border);
      opacity:.6;
      margin: 12px 0;
      transition: background-color var(--trans);
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 12px;
      margin-top: 12px;
    }
    @media (max-width: 920px){ .grid{ grid-template-columns: 1fr; } }

    .card{
      border: 1px solid var(--border);
      border-radius: 16px;
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      padding: 14px;
      box-shadow: var(--shadow-soft);
      transition:
        transform .24s ease,
        box-shadow .24s ease,
        border-color var(--trans),
        background-color var(--trans);
      position: relative;
      overflow: hidden;
      will-change: transform;
      backdrop-filter: blur(6px);
    }
    .card:hover{
      transform: translateY(-4px);
      box-shadow: 0 20px 36px rgba(0,0,0,.12);
    }
    body.dark .card:hover{
      box-shadow: 0 24px 42px rgba(0,0,0,.5);
    }
    body.readable .card:hover{
      transform: none;
      box-shadow: none;
    }

    .card.next{
      border-color: rgba(47,47,51,.22);
      box-shadow: var(--shadow);
    }
    .card.next::before,
    .card.passed::before,
    .card.tbd::before,
    .card.cancelled::before{
      content:"";
      position:absolute;
      left:0; top:0; bottom:0;
      width: 6px;
    }
    .card.next::before{ background: var(--next-br); }
    .card.passed::before{ background: var(--pass-br); }
    .card.tbd::before{ background: var(--upcoming-br); }
    .card.cancelled::before{ background: var(--cancel-br); }

    body.readable .card.next::before,
    body.readable .card.passed::before,
    body.readable .card.tbd::before,
    body.readable .card.cancelled::before{ width: 4px; }

    body.dark .card.next,
    body.dark .card.passed,
    body.dark .card.tbd,
    body.dark .card.cancelled{ border-color: rgba(255,255,255,.22); }

    .card-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .title{
      font-weight: var(--w-bold);
      font-size: 15px;
      margin: 0;
      line-height: 1.25;
      letter-spacing: .1px;
    }

    .badge{
      font-size: var(--small-font);
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: var(--w-semibold);
      white-space: nowrap;
      background: rgba(0,0,0,.02);
      color: var(--ink);
      transition: background-color var(--trans), border-color var(--trans), color var(--trans);
      line-height: 1.1;
    }
    body.dark .badge{ background: rgba(255,255,255,.04); }

    .badge-next{ background: var(--next-bg); border-color: var(--next-br); color: var(--next-tx); }
    .badge-pass{ background: var(--pass-bg); border-color: var(--pass-br); color: var(--pass-tx); }
    .badge-upcoming{ background: var(--upcoming-bg); border-color: var(--upcoming-br); color: var(--upcoming-tx); }
    .badge-cancelled{ background: var(--cancel-bg); border-color: var(--cancel-br); color: var(--cancel-tx); }

    .times{ margin-top: 10px; display:grid; gap: 8px; }
    .row{
      display:flex; justify-content:space-between; gap: 10px;
      padding: 10px 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(0,0,0,.015);
      transition: background-color var(--trans), border-color var(--trans);
    }
    body.dark .row{ background: rgba(255,255,255,.04); }

    .label{
      font-size: var(--small-font);
      color: var(--muted);
      font-weight: var(--w-regular);
      transition: color var(--trans);
    }
    .value{
      font-size: 13px;
      font-weight: var(--w-medium);
    }

    .count{
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 10px;
      background: rgba(0,0,0,.015);
      transition: background-color var(--trans), border-color var(--trans);
    }
    body.dark .count{ background: rgba(255,255,255,.04); }

    .count .k{
      font-size: var(--small-font);
      color: var(--muted);
      font-weight: var(--w-regular);
      transition: color var(--trans);
    }
    .count .v{
      margin-top: 6px;
      font-size: 14px;
      font-weight: var(--w-bold);
      letter-spacing: .2px;
    }

    .actions{
      display:flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 8px;
      text-decoration:none;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: var(--w-medium);
      font-size: 13px;
      transition: transform .16s ease, box-shadow .16s ease, background-color var(--trans), border-color var(--trans), color var(--trans);
      cursor: pointer;
      user-select:none;
      border: 1px solid var(--btn-br);
      background: var(--btn-bg);
      color: var(--btn-ink);
      line-height: 1.1;
      min-height: 38px;
    }
    .btn:hover{ transform: translateY(-1px); box-shadow: 0 12px 22px rgba(0,0,0,.08); }
    body.dark .btn:hover{ box-shadow: 0 18px 34px rgba(0,0,0,.45); }

    .btn-primary{
      background: var(--btn-primary-bg);
      color: var(--btn-primary-ink);
      border-color: var(--btn-primary-br);
      font-weight: var(--w-semibold);
    }

    .btn.disabled,
    .btn[aria-disabled="true"]{
      opacity: .45;
      cursor: not-allowed;
      pointer-events: none;
      box-shadow: none;
      transform: none;
    }

    .panel{
      border: 1px solid var(--border);
      border-radius: 16px;
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      padding: 14px;
      box-shadow: var(--shadow-soft);
      transition: background-color var(--trans), border-color var(--trans), box-shadow var(--trans);
      backdrop-filter: blur(6px);
    }
    .form-grid{
      display:grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }
    @media (max-width: 920px){ .form-grid{ grid-template-columns: 1fr; } }

    label{
      display:block;
      font-size: var(--small-font);
      color: var(--muted);
      font-weight: var(--w-regular);
      margin-bottom: 6px;
      transition: color var(--trans);
    }
    select{
      width: 100%;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      outline: none;
      font-size: 14px;
      line-height: 1.4;
      background: rgba(0,0,0,.01);
      color: var(--ink);
      font-weight: var(--w-regular);
      transition: background-color var(--trans), border-color var(--trans), color var(--trans), box-shadow var(--trans);
    }
    body.dark select{ background: rgba(255,255,255,.05); }
    select:focus{
      border-color: rgba(47,47,51,.28);
      box-shadow: 0 0 0 6px var(--focus);
    }
    body.dark select:focus{ border-color: rgba(255,255,255,.22); }

    .dock-lang-select{
      min-width: 170px;
      width: auto;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 12px;
    }

    .list{ margin-top: 12px; display:grid; gap: 10px; }
    .item{
      border: 1px solid var(--border);
      border-radius: 16px;
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      padding: 12px 12px;
      box-shadow: 0 10px 22px rgba(0,0,0,.04);
      transition: background-color var(--trans), border-color var(--trans), box-shadow var(--trans);
      backdrop-filter: blur(6px);
    }
    body.dark .item{ box-shadow: 0 18px 34px rgba(0,0,0,.42); }

    .item-top{
      display:flex;
      justify-content:space-between;
      gap: 10px;
      align-items:flex-start;
      flex-wrap: wrap;
    }
    .item-title{
      font-weight: var(--w-bold);
      font-size: 14px;
      margin: 0;
      line-height: 1.25;
    }
    .item-meta{
      font-size: var(--small-font);
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.4;
      font-weight: var(--w-regular);
      transition: color var(--trans);
    }
    .item-actions{
      margin-top: 10px;
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .bullets{
      margin: 10px 0 0 0;
      padding-left: 18px;
      display: grid;
      gap: 6px;
      font-size: 14px;
      line-height: 1.45;
    }
    .bullets li{ margin: 0; }

    .toggle-link{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.01);
      cursor: pointer;
      font-size: var(--small-font);
      color: var(--ink);
      font-weight: var(--w-medium);
      transition: background-color var(--trans), border-color var(--trans), color var(--trans), transform .16s ease, box-shadow .16s ease;
      margin-top: 10px;
      min-height: 36px;
      text-decoration: none;
    }
    body.dark .toggle-link{ background: rgba(255,255,255,.05); }
    .toggle-link:hover{ transform: translateY(-1px); box-shadow: 0 12px 22px rgba(0,0,0,.08); }
    body.dark .toggle-link:hover{ box-shadow: 0 18px 34px rgba(0,0,0,.45); }

    .toast{
      position: fixed;
      bottom: 86px;
      left: 50%;
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease, background-color var(--trans), color var(--trans);
      z-index: 220;
      background: var(--tab-on);
      color: var(--tab-on-ink);
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: 0 16px 40px rgba(0,0,0,.16);
      font-weight: var(--w-medium);
      font-size: 13px;
      line-height: 1.1;
    }
    .toast.show{
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .dock{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 200;
      background: var(--dock-bg);
      border: 1px solid var(--dock-border);
      box-shadow: var(--dock-shadow);
      border-radius: 999px;
      padding: 10px 12px;
      display:flex;
      align-items:center;
      gap: 12px;
      backdrop-filter: blur(12px);
      transition: background-color var(--trans), border-color var(--trans), box-shadow var(--trans);
      user-select:none;
      max-width: calc(100% - 24px);
    }

    .dock .hint{
      font-size: 12px;
      color: var(--muted);
      transition: color var(--trans);
      white-space: nowrap;
      font-weight: var(--w-medium);
    }

    .pill{
      display:flex;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--dock-border);
      background: var(--dock-track);
      border-radius: 999px;
      transition: background-color var(--trans), border-color var(--trans);
    }

    .pill button{
      appearance:none;
      border:0;
      background: transparent;
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: var(--w-semibold);
      font-size: 12px;
      cursor: pointer;
      transition: background-color var(--trans), color var(--trans), transform .16s ease, box-shadow .16s ease;
      line-height: 1.1;
      white-space: nowrap;
    }
    .pill button:hover{ transform: translateY(-1px); }
    .pill button[aria-pressed="true"]{
      background: var(--tab-on);
      color: var(--tab-on-ink);
      box-shadow: 0 10px 20px rgba(0,0,0,.10);
    }

    @media (max-width: 860px){
      .dock{
        border-radius: 18px;
        padding: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .dock .hint{ text-align: center; }
      .dock-lang-select{
        width: 100%;
        min-width: 0;
      }
    }

    @media (prefers-reduced-motion: reduce){
      *{ transition: none !important; }
      .tab:hover, .btn:hover, .pill button:hover, .toggle-link:hover, .card:hover{ transform:none !important; }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand" id="brand-easter-egg" title="Project Imperium – Pod K Meeting Dashboard">
        Project Imperium – Pod K Meeting Dashboard
      </div>

      <div class="topbar-right">
        <div class="tabs" role="tablist" aria-label="Dashboard tabs">
          <button class="tab" id="tab-dashboard" role="tab" aria-selected="true" aria-controls="view-dashboard">Meeting Dashboard</button>
          <button class="tab" id="tab-archive" role="tab" aria-selected="false" aria-controls="view-archive">Meeting Notes Archive</button>
        </div>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="views">

    let currentLang = "en";

    function t(key){
      const lang = I18N[currentLang] ? currentLang : "en";
      return I18N[lang][key] || I18N.en[key] || key;
    }

    function setPressed(id, pressed) {
      const el = document.getElementById(id);
      if (el) el.setAttribute("aria-pressed", String(!!pressed));
    }

    function applyTheme(theme) {
      const isDark = theme === "dark";
      document.body.classList.toggle("dark", isDark);
      setPressed("theme-light", !isDark);
      setPressed("theme-dark", isDark);
      try { localStorage.setItem(THEME_KEY, isDark ? "dark" : "light"); } catch {}
    }

    function applyReadable(on) {
      document.body.classList.toggle("readable", !!on);
      setPressed("acc-readable", !!on);
      try { localStorage.setItem(READABLE_KEY, on ? "1" : "0"); } catch {}
    }

    function applyCb(on) {
      document.body.classList.toggle("cb", !!on);
      setPressed("acc-cb", !!on);
      try { localStorage.setItem(CB_KEY, on ? "1" : "0"); } catch {}
    }

    function getPreferredTheme() {
      try {
        const saved = localStorage.getItem(THEME_KEY);
        if (saved === "light" || saved === "dark") return saved;
      } catch {}
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      return prefersDark ? "dark" : "light";
    }

    function getPrefBool(key, fallback=false) {
      try {
        const v = localStorage.getItem(key);
        if (v === "1") return true;
        if (v === "0") return false;
      } catch {}
      return fallback;
    }

    function getPreferredLang(){
      try {
        const saved = localStorage.getItem(LANG_KEY);
        if (saved && I18N[saved]) return saved;
      } catch {}
      return "en";
    }

    function applyLanguage(lang){
      currentLang = I18N[lang] ? lang : "en";
      try { localStorage.setItem(LANG_KEY, currentLang); } catch {}

      const rtlLangs = ["ar"];
      document.documentElement.lang = currentLang === "en" ? "en-GB" : currentLang;
      document.documentElement.dir = rtlLangs.includes(currentLang) ? "rtl" : "ltr";

      document.getElementById("accessibility-hint").textContent = t("accessibility");
      document.getElementById("language-hint").textContent = t("language");
      document.getElementById("theme-light").textContent = t("light");

    const pad2 = (n) => String(n).padStart(2, "0");

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function safeHref(path) {
      if (!path) return "";
      return encodeURI(path);
    }

    function formatUtcLabel(isoZ) {
      if (!isoZ) return "TBD";
      const d = new Date(isoZ);
      const date = new Intl.DateTimeFormat(undefined, { day:"2-digit", month:"short", year:"numeric", timeZone:"UTC" }).format(d);
      const time = new Intl.DateTimeFormat(undefined, { hour:"2-digit", minute:"2-digit", hour12:false, timeZone:"UTC" }).format(d);
      return `${date}, ${time} (GMT)`;
    }

    function formatLocalLabel(isoZ) {
      if (!isoZ) return t("toBeConfirmed");
      const d = new Date(isoZ);
      const date = new Intl.DateTimeFormat(undefined, { day:"2-digit", month:"short", year:"numeric" }).format(d);
      const time = new Intl.DateTimeFormat(undefined, { hour:"2-digit", minute:"2-digit", hour12:false }).format(d);
      const tzAbbr = new Intl.DateTimeFormat(undefined, { timeZoneName:"short" })
        .formatToParts(d)
        .find(p => p.type === "timeZoneName")?.value;
      return `${date}, ${time} (${tzAbbr || "local"})`;
    }

    function msToParts(ms) {
      const total = Math.max(0, Math.floor(ms / 1000));
      const days = Math.floor(total / 86400);
      const hours = Math.floor((total % 86400) / 3600);
      const mins = Math.floor((total % 3600) / 60);
      const secs = total % 60;
      return { days, hours, mins, secs };
    }

    function toGCalUtc(isoZ) {
      const d = new Date(isoZ);
      return (
        d.getUTCFullYear() +
        pad2(d.getUTCMonth() + 1) +
        pad2(d.getUTCDate()) +
        "T" +
        pad2(d.getUTCHours()) +
        pad2(d.getUTCMinutes()) +
        pad2(d.getUTCSeconds()) +
        "Z"
      );
    }

    function makeGoogleCalendarUrl({ title, calendarTitle, startUtc, endUtc, meetLink }) {
      const base = "https://calendar.google.com/calendar/render?action=TEMPLATE";
      const dates = `${toGCalUtc(startUtc)}/${toGCalUtc(endUtc)}`;
      const details = meetLink ? `Meeting link: ${meetLink}` : "";
      const location = meetLink || "";
      const text = calendarTitle || title || "Meeting";
      const params = new URLSearchParams({ text, dates, details, location });
      return `${base}&${params.toString()}`;
    }

      viewArchive.classList.toggle("hidden", isDash);
    }
    tabDashboard.addEventListener("click", () => show("dashboard"));
    tabArchive.addEventListener("click", () => show("archive"));

    function populateMeetingSelect(selectEl, includeAll = false) {
      const rememberedValue = selectEl.value;
      selectEl.innerHTML = "";
      if (includeAll) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = t("allMeetings");
        selectEl.appendChild(opt);
      }

      for (const note of notes) {
        const meta = archiveMeetings[note.meetingId];
        const opt = document.createElement("option");
        opt.value = note.meetingId;
        opt.textContent = meta
          ? `${meta.title} — ${formatUtcLabel(meta.startUtc)}`
          : note.title;
        selectEl.appendChild(opt);
      }

      if ([...selectEl.options].some(o => o.value === rememberedValue)) {
        selectEl.value = rememberedValue;
      }
    }

    function getNextMeetingIndex() {
      const now = Date.now();
      const future = dashboardMeetings
        .map((m, i) => ({
          i,
          t: (m.startUtc && m.statusOverride !== "cancelled") ? new Date(m.startUtc).getTime() : Infinity
        }))
        .filter(x => x.t > now)
        .sort((a,b) => a.t - b.t);
      return future.length ? future[0].i : -1;
    }

    function badgeClass(badge) {
      if (badge === t("nextUp")) return "badge badge-next";
      if (badge === t("passed")) return "badge badge-pass";
      if (badge === t("cancelled")) return "badge badge-cancelled";
      return "badge badge-upcoming";
    }

    function cardHtml(m, idx, nextIdx) {
      const hasTime = !!(m.startUtc && m.endUtc);
      const now = Date.now();
      const start = hasTime ? new Date(m.startUtc).getTime() : NaN;
      const isCancelled = m.statusOverride === "cancelled";
      const passed = hasTime ? now >= start : false;

      let badge = t("upcoming");
      if (isCancelled) badge = t("cancelled");
      else if (!hasTime) badge = t("upcoming");
      else if (idx === nextIdx && !passed) badge = t("nextUp");
      else if (passed || m.statusOverride === "passed") badge = t("passed");

      let countdownBlock = "";
      if (isCancelled) {
        countdownBlock = `<div class="count"><div class="k">${escapeHtml(t("status"))}</div><div class="v">${escapeHtml(m.cancelNote || t("cancelledNote"))}</div></div>`;
      } else if (!hasTime) {
        countdownBlock = `<div class="count"><div class="k">${escapeHtml(t("status"))}</div><div class="v">${escapeHtml(t("toBeConfirmed"))}</div></div>`;
      } else if (passed || m.statusOverride === "passed") {
        countdownBlock = `<div class="count"><div class="k">${escapeHtml(t("status"))}</div><div class="v">${escapeHtml(t("meetingPassed"))}</div></div>`;
      } else {
        countdownBlock = `<div class="count"><div class="k">${escapeHtml(t("startsIn"))}</div><div class="v" data-countdown="${escapeHtml(m.id)}">–</div></div>`;
      }

      const notesBtn = (passed || m.statusOverride === "passed")
        ? `<button class="btn btn-primary" data-view-notes="${escapeHtml(m.id)}" type="button">${escapeHtml(t("viewNotes"))}</button>`
        : "";

      const hasCalendar = !!(m.title && m.startUtc && m.endUtc && !isCancelled);
      const gcal = hasCalendar ? makeGoogleCalendarUrl(m) : "";
      const gcalBtn = hasCalendar
        ? `<a class="btn btn-primary" href="${gcal}" target="_blank" rel="noopener noreferrer">${escapeHtml(t("addToCalendar"))}</a>`
        : `<span class="btn btn-primary disabled" aria-disabled="true" title="Calendar details not available">${escapeHtml(t("addToCalendar"))}</span>`;

      const hasMeetLink = !!(m.meetLink && String(m.meetLink).trim() && !isCancelled);
      const meetBtn = hasMeetLink
        ? `<a class="btn" href="${escapeHtml(m.meetLink)}" target="_blank" rel="noopener noreferrer">${escapeHtml(t("openMeetingLink"))}</a>`
        : `<span class="btn disabled" aria-disabled="true" title="${isCancelled ? escapeHtml(t("cancelled")) : "Meeting link not set"}">${escapeHtml(t("openMeetingLink"))}</span>`;

      const audienceRow = m.audience
        ? `<div class="row"><div class="label">${escapeHtml(t("focus"))}</div><div class="value">${escapeHtml(m.audience)}</div></div>`
        : "";

      let cardClass = "card";
      if (isCancelled) cardClass += " cancelled";
      else if (!hasTime) cardClass += " tbd";
      else if (passed || m.statusOverride === "passed") cardClass += " passed";
      else if (idx === nextIdx) cardClass += " next";

      return `
        <article class="${cardClass}">
          <div class="card-top">
            <p class="title">${escapeHtml(m.title || "Meeting")}</p>
            <span class="${badgeClass(badge)}">${escapeHtml(badge)}</span>
          </div>

          <div class="times">
            <div class="row">
              <div class="label">${escapeHtml(t("gmtTime"))}</div>
              <div class="value">${formatUtcLabel(m.startUtc)}</div>
            </div>
            <div class="row">
              <div class="label">${escapeHtml(t("localTime"))}</div>
              <div class="value">${formatLocalLabel(m.startUtc)}</div>
            </div>
            ${audienceRow}
          </div>

          ${countdownBlock}

          <div class="actions">
            ${gcalBtn}
            ${meetBtn}
            ${notesBtn}
          </div>
        </article>
      `;
    }

    function renderMeetings() {
      const nextIdx = getNextMeetingIndex();
      const cardsEl = document.getElementById("cards");
      cardsEl.innerHTML = dashboardMeetings.map((m, i) => cardHtml(m, i, nextIdx)).join("");

      cardsEl.querySelectorAll("[data-view-notes]").forEach(btn => {
        btn.addEventListener("click", () => {
          const meetingId = btn.getAttribute("data-view-notes");
          document.getElementById("filter-meeting").value = meetingId || "";
          rememberFilter(meetingId || "");
          show("archive");
          loadArchive(meetingId || "");
          toast(t("showingNotes"));
        });
      });
    }

    function tickCountdowns() {
      const now = Date.now();
      document.querySelectorAll("[data-countdown]").forEach(el => {
        const meetingId = el.getAttribute("data-countdown");
        const m = dashboardMeetings.find(x => x.id === meetingId);
        if (!m || !m.startUtc || m.statusOverride === "cancelled") return;

        const start = new Date(m.startUtc).getTime();
        const diff = start - now;

        if (diff <= 0) {
          el.textContent = t("meetingPassed");
          return;
        }

        const p = msToParts(diff);
        const dayPart = p.days > 0 ? `${p.days}d ` : "";
        el.textContent = `${dayPart}${pad2(p.hours)}:${pad2(p.mins)}:${pad2(p.secs)}`;
      });
    }

    function meetingLabel(meetingId) {
      const meta = archiveMeetings[meetingId];
      if (!meta) return t("meeting");
      return `${meta.title} — ${formatUtcLabel(meta.startUtc)}`;
    }

    function formatWhen(isoZ) {
      if (!isoZ) return "–";
      const d = new Date(isoZ);
      const date = new Intl.DateTimeFormat(undefined, { day:"2-digit", month:"short", year:"numeric" }).format(d);
      const time = new Intl.DateTimeFormat(undefined, { hour:"2-digit", minute:"2-digit", hour12:false }).format(d);
      return `${date}, ${time}`;
    }

    function loadArchive(meetingId = "") {
      const list = document.getElementById("archive-list");

      const filtered = notes
        .filter(n => !meetingId || n.meetingId === meetingId)
        .sort((a,b) => new Date(b.createdAt || 0).getTime() - new Date(a.createdAt || 0).getTime());

      if (!filtered.length) {
        list.innerHTML = `
          <div class="item">
            <p class="item-title">${escapeHtml(t("noNotesYet"))}</p>
            <div class="item-meta">${escapeHtml(t("notesAppear"))}</div>
          </div>
        `;
        return;
      }

      const maxBulletsDefault = 2;

      list.innerHTML = filtered.map(n => {
        const title = (n.title && String(n.title).trim()) ? String(n.title).trim() : "Meeting minutes";
        const createdAt = formatWhen(n.createdAt);

        const bullets = Array.isArray(n.bullets)
          ? n.bullets.filter(Boolean).map(x => String(x).trim()).filter(Boolean)
          : [];

        const visible = bullets.slice(0, maxBulletsDefault).map(b => `<li>${escapeHtml(b)}</li>`).join("");
        const hidden = bullets.slice(maxBulletsDefault).map(b => `<li>${escapeHtml(b)}</li>`).join("");
        const hasMore = bullets.length > maxBulletsDefault;

        const hasPdf = !!(n.pdfUrl && String(n.pdfUrl).trim());
        const pdfLink = hasPdf ? safeHref(String(n.pdfUrl).trim()) : "";

        const hasPresentation = !!(n.presentationUrl && String(n.presentationUrl).trim());
        const presentationLink = hasPresentation ? safeHref(String(n.presentationUrl).trim()) : "";

        const pdfBtn = hasPdf
          ? `<a class="btn btn-primary" href="${escapeHtml(pdfLink)}" target="_blank" rel="noopener noreferrer">${escapeHtml(t("openMinutes"))}</a>`
          : `<span class="btn btn-primary disabled" aria-disabled="true" title="No minutes PDF attached">${escapeHtml(t("openMinutes"))}</span>`;

        const presentationBtn = hasPresentation
          ? `<a class="btn" href="${escapeHtml(presentationLink)}" target="_blank" rel="noopener noreferrer">${escapeHtml(t("openPresentation"))}</a>`
          : `<span class="btn disabled" aria-disabled="true" title="No presentation PDF attached">${escapeHtml(t("openPresentation"))}</span>`;

        return `
          <div class="item">
            <div class="item-top">
              <div>
                <p class="item-title">${escapeHtml(title)}</p>
                <div class="item-meta">
                  <div>${escapeHtml(t("meeting"))}: ${escapeHtml(meetingLabel(n.meetingId))}</div>
                  <div>${escapeHtml(t("added"))}: ${escapeHtml(createdAt)}</div>
                </div>
              </div>
            </div>

            <div class="item-meta" style="margin-top:10px;">
              ${bullets.length ? `
                <ul class="bullets">
                  ${visible}
                  ${hasMore ? `<span data-bullets-hidden="${escapeHtml(n.id)}" style="display:none;">${hidden}</span>` : ``}
                </ul>
                ${hasMore ? `<button class="toggle-link" type="button" data-bullets-toggle="${escapeHtml(n.id)}">${escapeHtml(t("showMore"))}</button>` : ``}
              ` : `–`}
            </div>

            <div class="item-actions">
              ${pdfBtn}
              ${presentationBtn}
            </div>
          </div>
        `;
      }).join("");
    }

    document.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-bullets-toggle]");
      if (!btn) return;

      const id = btn.getAttribute("data-bullets-toggle");
      const hidden = document.querySelector(`[data-bullets-hidden="${CSS.escape(id)}"]`);
      if (!hidden) return;

      const isOpen = hidden.style.display !== "none";
      hidden.style.display = isOpen ? "none" : "inline";
      btn.textContent = isOpen ? t("showMore") : t("showLess");
    });

    const FILTER_KEY = "imperium_archive_filter_v9";
    function rememberFilter(meetingId) { try { localStorage.setItem(FILTER_KEY, meetingId || ""); } catch {} }
    function recallFilter() { try { return localStorage.getItem(FILTER_KEY) || ""; } catch { return ""; } }

    function applyFilter() {
      const meetingId = document.getElementById("filter-meeting").value || "";
      rememberFilter(meetingId);
      loadArchive(meetingId);
    }
    function clearFilter() {
      document.getElementById("filter-meeting").value = "";
      rememberFilter("");
      loadArchive("");
    }

    function updateNowPill() {
      const d = new Date();
      const time = new Intl.DateTimeFormat(undefined, { hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false }).format(d);
      document.getElementById("now-pill").textContent = `${t("nowPrefix")}: ${time}`;
    }

    function updateTimezoneLine() {
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown";
      document.getElementById("tz-line").textContent = `${t("timezonePrefix")}: ${tz}. ${t("timezoneSuffix")}`;
    }

    (function init(){
      updateTimezoneLine();
      updateNowPill();
      setInterval(updateNowPill, 1000);

      populateMeetingSelect(document.getElementById("filter-meeting"), true);

      const remembered = recallFilter();
      if (remembered) document.getElementById("filter-meeting").value = remembered;

      renderMeetings();
      tickCountdowns();
      setInterval(tickCountdowns, 1000);

      loadArchive(remembered || "");

      document.getElementById("refresh-archive").addEventListener("click", () => applyFilter());
      document.getElementById("apply-filter").addEventListener("click", () => applyFilter());
      document.getElementById("clear-filter").addEventListener("click", () => clearFilter());

      const tab = new URL(window.location.href).searchParams.get("tab");
      const meetingId = new URL(window.location.href).searchParams.get("meetingId") || "";
      if (tab === "archive") {
        show("archive");
        if (meetingId) {
          document.getElementById("filter-meeting").value = meetingId;
          rememberFilter(meetingId);
        }
        loadArchive(meetingId || remembered || "");
      }
    })();

    (function initEasterEgg(){
      const brand = document.getElementById("brand-easter-egg");
      if (!brand) return;

      let clicks = 0;
      let resetTimer = null;

      brand.addEventListener("click", () => {
        clicks += 1;

        clearTimeout(resetTimer);
        resetTimer = setTimeout(() => {
          clicks = 0;
        }, 1800);

        if (clicks >= 5) {
          clicks = 0;
          toast(t("easterEgg"));
          brand.animate(
            [
              { transform: "translateY(0px)", letterSpacing: ".2px" },
              { transform: "translateY(-1px)", letterSpacing: ".8px" },
              { transform: "translateY(0px)", letterSpacing: ".2px" }
            ],
            {
              duration: 420,
              easing: "ease"
            }
          );
        }
      });
    })();
  </script>
</body>
</html>
