<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Imperium – Pod K Meeting Dashboard</title>

<style>

/* ---------------- Base theme variables ---------------- */

:root{

--bg:#ffffff;
--ink:#2f2f33;
--muted:rgba(47,47,51,.65);
--border:rgba(47,47,51,.14);
--panel:#ffffff;

--shadow:0 12px 28px rgba(0,0,0,.08);
--radius:16px;

--next-bg:rgba(66,180,120,.18);
--next-br:rgba(66,180,120,.38);
--next-tx:rgb(24,110,70);

--pass-bg:rgba(245,106,106,.18);
--pass-br:rgba(245,106,106,.42);
--pass-tx:rgb(150,40,40);

--cancel-bg:rgba(255,196,64,.18);
--cancel-br:rgba(255,196,64,.42);
--cancel-tx:rgb(138,88,0);

--btn-bg:#fff;
--btn-border:rgba(0,0,0,.12);

--matrix-opacity:.35;
--matrix-colour:rgba(0,0,0,.35);

}

/* ---------------- Dark mode ---------------- */

body.dark{

--bg:#0f1115;
--ink:rgba(255,255,255,.92);
--muted:rgba(255,255,255,.6);
--border:rgba(255,255,255,.16);
--panel:#151823;

--btn-bg:#fff;
--btn-border:#fff;

--matrix-opacity:.5;
--matrix-colour:rgba(120,255,180,.8);

}

/* ---------------- Layout ---------------- */

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:var(--bg);
color:var(--ink);
transition:.25s;
}

.wrap{
max-width:1040px;
margin:auto;
padding:24px 18px 120px;
position:relative;
z-index:1;
}

/* ---------------- Matrix canvas ---------------- */

#matrix-bg{
position:fixed;
inset:0;
z-index:0;
pointer-events:none;
opacity:var(--matrix-opacity);
}

/* ---------------- Header ---------------- */

.topbar{
position:sticky;
top:0;
background:rgba(255,255,255,.85);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--border);
z-index:2;
}

body.dark .topbar{
background:rgba(15,17,21,.85);
}

.topbar-inner{
max-width:1040px;
margin:auto;
padding:14px 18px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:12px;
}

.brand{
font-weight:700;
font-size:15px;
}

.tabs{
display:flex;
gap:6px;
border:1px solid var(--border);
padding:4px;
border-radius:999px;
}

.tab{
border:0;
background:transparent;
padding:8px 12px;
border-radius:999px;
font-weight:600;
cursor:pointer;
color:var(--muted);
}

.tab[aria-selected="true"]{
background:var(--ink);
color:#fff;
}

/* ---------------- Cards ---------------- */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
margin-top:18px;
}

@media(max-width:920px){
.grid{grid-template-columns:1fr}
}

.card{
background:var(--panel);
border:1px solid var(--border);
border-radius:var(--radius);
padding:16px;
box-shadow:var(--shadow);
transition:.2s;
position:relative;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 22px 40px rgba(0,0,0,.12);
}

.card::before{
content:"";
position:absolute;
left:0;
top:0;
bottom:0;
width:6px;
border-radius:16px 0 0 16px;
}

.card.next::before{background:var(--next-br)}
.card.passed::before{background:var(--pass-br)}
.card.cancelled::before{background:var(--cancel-br)}

.title{
font-weight:700;
font-size:15px;
margin:0 0 4px 0;
}

.badge{
font-size:12px;
padding:6px 10px;
border-radius:999px;
font-weight:600;
border:1px solid var(--border);
}

.badge-next{background:var(--next-bg);border-color:var(--next-br);color:var(--next-tx)}
.badge-pass{background:var(--pass-bg);border-color:var(--pass-br);color:var(--pass-tx)}
.badge-cancel{background:var(--cancel-bg);border-color:var(--cancel-br);color:var(--cancel-tx)}

.row{
display:flex;
justify-content:space-between;
padding:10px;
border:1px solid var(--border);
border-radius:10px;
margin-top:8px;
font-size:13px;
}

.actions{
display:flex;
gap:10px;
margin-top:12px;
flex-wrap:wrap;
}

.btn{
padding:10px 12px;
border-radius:10px;
border:1px solid var(--btn-border);
background:var(--btn-bg);
cursor:pointer;
font-weight:600;
font-size:13px;
}

.btn-primary{
background:var(--ink);
color:#fff;
border-color:var(--ink);
}

.btn.disabled{
opacity:.4;
pointer-events:none;
}

/* ---------------- Archive ---------------- */

.list{margin-top:16px;display:grid;gap:12px}

.item{
border:1px solid var(--border);
border-radius:16px;
padding:14px;
background:var(--panel);
}

.item-title{
font-weight:700;
font-size:14px;
margin:0;
}

.item-meta{
font-size:12px;
color:var(--muted);
margin-top:4px;
}

.bullets{
margin-top:10px;
padding-left:18px;
}

/* ---------------- Toggle dock ---------------- */

.dock{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
background:var(--panel);
border:1px solid var(--border);
border-radius:999px;
padding:10px 14px;
display:flex;
gap:16px;
z-index:3;
box-shadow:0 18px 40px rgba(0,0,0,.15);
}

.pill{
display:flex;
gap:6px;
}

.pill button{
border:0;
padding:8px 12px;
border-radius:999px;
cursor:pointer;
font-weight:600;
background:transparent;
}

.pill button[aria-pressed="true"]{
background:var(--ink);
color:#fff;
}

/* ---------------- Toast ---------------- */

.toast{
position:fixed;
bottom:90px;
left:50%;
transform:translateX(-50%);
background:var(--ink);
color:#fff;
padding:10px 16px;
border-radius:999px;
opacity:0;
transition:.2s;
}

.toast.show{opacity:1}

</style>
</head>

<body>

<canvas id="matrix-bg"></canvas>

<div class="topbar">
<div class="topbar-inner">
<div class="brand">Project Imperium – Pod K Meeting Dashboard</div>

<div class="tabs">
<button class="tab" id="tab-dashboard" aria-selected="true">Meeting Dashboard</button>
<button class="tab" id="tab-archive" aria-selected="false">Meeting Notes Archive</button>
</div>
</div>
</div>

<div class="wrap">

<div class="grid" id="cards"></div>

<div id="archive" style="display:none">

<div class="list" id="archive-list"></div>

</div>

</div>

<div class="dock">

<div class="pill">
<button id="theme-light" aria-pressed="true">Light</button>
<button id="theme-dark" aria-pressed="false">Dark</button>
</div>

</div>

<div class="toast" id="toast"></div>

<script>

/* ---------------- Theme toggle ---------------- */

const themeLight=document.getElementById("theme-light")
const themeDark=document.getElementById("theme-dark")

themeLight.onclick=()=>{
document.body.classList.remove("dark")
themeLight.setAttribute("aria-pressed","true")
themeDark.setAttribute("aria-pressed","false")
}

themeDark.onclick=()=>{
document.body.classList.add("dark")
themeLight.setAttribute("aria-pressed","false")
themeDark.setAttribute("aria-pressed","true")
}

/* ---------------- Meetings ---------------- */

const meetings=[
{
title:"Office Hours – 10 Mar (APAC)",
status:"passed"
},
{
title:"Office Hours – 12 Mar (US)",
status:"cancelled"
},
{
title:"TBD",
status:"upcoming"
}
]

const cards=document.getElementById("cards")

meetings.forEach(m=>{

let badge="Upcoming"
let badgeClass="badge"

if(m.status==="passed"){badge="Passed";badgeClass="badge badge-pass"}
if(m.status==="cancelled"){badge="Cancelled";badgeClass="badge badge-cancel"}

const card=document.createElement("div")
card.className="card "+m.status

card.innerHTML=`

<div style="display:flex;justify-content:space-between">
<p class="title">${m.title}</p>
<span class="${badgeClass}">${badge}</span>
</div>

<div class="actions">
<button class="btn disabled">Add to Google Calendar</button>
<button class="btn disabled">Open meeting link</button>
</div>

`

cards.appendChild(card)

})

/* ---------------- Matrix background ---------------- */

const canvas=document.getElementById("matrix-bg")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()

window.addEventListener("resize",resize)

const letters="01{}[]<>/+=*LLMgitmergepatchrubric"
const fontSize=18
const columns=Math.floor(window.innerWidth/fontSize)

const drops=[]

for(let i=0;i<columns;i++){
drops[i]=1
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle=getComputedStyle(document.body).getPropertyValue("--matrix-colour")
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)]
ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0
}

drops[i]++

}

}

setInterval(draw,35)

</script>

</body>
</html>
